<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地磁力搜索预览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header-content">
          <h1>本地磁力搜索预览</h1>
          <p class="subtitle">输入关键字或粘贴磁力链接，快速获取预览卡片。</p>
        </div>
        <nav class="nav-tabs" aria-label="页面导航">
          <button type="button" class="nav-tab is-active" data-view="home">首页</button>
          <button type="button" class="nav-tab" data-view="history">历史列表</button>
          <button type="button" class="nav-tab" data-view="collections">
            <span class="nav-tab-icon">📁</span> 收藏集
          </button>
        </nav>
      </header>

      <main>
        <section id="homeSection" class="view-section" aria-label="磁力搜索">
          <section class="search-panel">
            <form id="searchForm" class="search-form">
              <label for="searchInput" class="search-label">搜索关键字 / 磁力链接</label>
              <div class="search-input-group">
                <input
                  id="searchInput"
                  name="query"
                  type="text"
                  placeholder="例如：Ubuntu ISO 或 magnet:?xt=..."
                  autocomplete="off"
                  required
                />
                <button type="submit" id="searchButton">搜索</button>
              </div>
              <div class="adapter-switcher">
                <label for="adapterSelect" class="adapter-label">数据源</label>
                <select id="adapterSelect" name="adapter">
                  <option value="" disabled selected>加载中...</option>
                </select>
                <p class="adapter-description" id="adapterDescription"></p>
              </div>
            </form>
            <p class="helper">提示：粘贴磁链可直接生成卡片，不会请求远程服务。可在下方选择不同磁力搜索适配器。</p>
          </section>

          <section class="result-section" aria-live="polite">
            <div id="status" class="status" hidden></div>
            <div id="results" class="results-grid"></div>
            <div id="pagination" class="pagination" hidden>
              <div class="pagination-controls">
                <button type="button" id="prevPageBtn" class="pagination-btn" disabled>上一页</button>
                <span class="pagination-info">
                  第 <span id="currentPage">1</span> 页
                  <span id="totalPages" hidden>/ 共 <span id="totalPagesValue">0</span> 页</span>
                </span>
                <button type="button" id="nextPageBtn" class="pagination-btn" disabled>下一页</button>
              </div>
              <div class="page-input-container">
                <label for="pageInput" class="page-input-label">跳转到页：</label>
                <input 
                  type="number" 
                  id="pageInput" 
                  class="page-input" 
                  min="1" 
                  value="1"
                  placeholder="页码"
                />
                <button type="button" id="goToPageBtn" class="pagination-btn">跳转</button>
              </div>
            </div>
          </section>
        </section>

        <section id="historySection" class="view-section" aria-live="polite">
          <div class="history-panel">
            <div class="history-panel__header">
              <div>
                <h2>搜索历史</h2>
                <p class="history-panel__subtitle">最多保存 50 条历史记录，每条记录保留最近 20 个结果。</p>
              </div>
              <button type="button" id="historyRefreshButton" class="ghost-button">刷新</button>
            </div>
            <div id="historyStatus" class="status" hidden></div>
            <div id="historyList" class="history-list"></div>
          </div>
        </section>

        <section id="collectionsSection" class="view-section" aria-live="polite">
          <div id="collectionsListView" class="collections-panel">
            <div class="collections-panel__header">
              <div>
                <h2>收藏集</h2>
                <p class="collections-panel__subtitle">管理和组织你的磁力链接收藏。</p>
              </div>
              <div class="collections-panel__actions">
                <button type="button" id="createCollectionBtn" class="ghost-button">+ 新建收藏集</button>
              </div>
            </div>
            <div id="collectionsStatus" class="status" hidden></div>
            <div id="collectionsList" class="collections-grid"></div>
          </div>

          <div id="collectionDetailView" class="collections-panel" style="display:none;">
            <div class="collections-panel__header">
              <div class="collection-header-main">
                <button type="button" id="backToCollectionsBtn" class="back-button" title="返回列表">←</button>
                <div>
                  <h2 id="collectionDetailTitle">收藏集</h2>
                  <p id="collectionDetailMeta" class="collections-panel__subtitle"></p>
                </div>
              </div>
              <div class="collections-panel__actions">
                <button type="button" id="addItemBtn" class="ghost-button">+ 添加条目</button>
                <button type="button" id="importCSVBtn" class="ghost-button">📥 导入 CSV</button>
                <button type="button" id="deleteCollectionBtn" class="ghost-button delete-btn">🗑 删除集合</button>
              </div>
            </div>

            <div class="collection-search-bar">
              <div class="collection-search-input-wrapper">
                <input type="text" id="collectionSearchInput" placeholder="搜索当前集合..." autocomplete="off" />
              </div>
              <label class="collection-star-filter">
                <input type="checkbox" id="collectionStarFilter" />
                <span>⭐ 仅显示星标</span>
              </label>
            </div>

            <div id="batchActionsBar" class="batch-actions-bar" hidden>
              <span id="selectedCountText">已选择 0 项</span>
              <div class="batch-actions-buttons">
                <button type="button" id="batchDeleteBtn" class="batch-btn delete-btn">批量删除</button>
                <button type="button" id="cancelSelectionBtn" class="batch-btn">取消</button>
              </div>
            </div>

            <div id="collectionDetailStatus" class="status" hidden></div>
            <div id="collectionItems" class="results-grid"></div>
            <div id="collectionPagination" class="pagination" hidden>
              <div class="pagination-controls">
                <button type="button" id="collPrevPageBtn" class="pagination-btn" disabled>上一页</button>
                <span class="pagination-info">
                  第 <span id="collCurrentPage">1</span> 页 / 共 <span id="collTotalPages">0</span> 页
                </span>
                <button type="button" id="collNextPageBtn" class="pagination-btn" disabled>下一页</button>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span>前端本地运行 · 当前适配器：<strong id="footerAdapterName">加载中...</strong></span>
        <span id="footerAdapterEndpoint" class="footer-subtext"></span>
      </footer>
    </div>

    <template id="cardTemplate">
      <article class="result-card">
        <header class="card-header">
          <h2 class="card-title"></h2>
          <span class="card-badge"></span>
        </header>
        <dl class="card-meta"></dl>
        <footer class="card-footer">
          <a class="card-action" target="_blank" rel="noopener noreferrer">复制磁力链接</a>
          <a class="card-open">打开</a>
        </footer>
      </article>
    </template>

    <template id="historyCardTemplate">
      <article class="history-card" data-expanded="false">
        <header class="history-card__header">
          <div>
            <p class="history-card__query"></p>
            <p class="history-card__meta"></p>
          </div>
          <div class="history-card__controls">
            <button type="button" class="history-card__delete">删除</button>
            <button type="button" class="history-card__toggle">展开</button>
          </div>
        </header>
        <div class="history-card__body">
          <p class="history-card__empty" hidden>本次搜索没有结果。</p>
          <ul class="history-card__results"></ul>
        </div>
      </article>
    </template>

    <template id="collectionCardTemplate">
      <article class="collection-card" data-id="">
        <div class="collection-card__icon">📁</div>
        <div class="collection-card__info">
          <h3 class="collection-card__name"></h3>
          <p class="collection-card__meta"></p>
        </div>
        <div class="collection-card__actions">
          <button type="button" class="collection-card__open ghost-button">查看</button>
          <button type="button" class="collection-card__delete ghost-button delete-btn">删除</button>
        </div>
      </article>
    </template>

    <template id="collectionItemTemplate">
      <article class="collection-item-card" data-starred="false">
        <div class="collection-item__selection">
          <input type="checkbox" class="collection-item__checkbox" />
        </div>
        <div class="collection-item__content">
          <header class="collection-item__header">
            <h3 class="collection-item__title"></h3>
          </header>
          <div class="collection-item__keywords"></div>
          <div class="collection-item__remarks"></div>
          <div class="collection-item__meta-actions">
            <dl class="card-meta"></dl>
            <footer class="card-footer">
              <a class="card-action" target="_blank" rel="noopener noreferrer">复制</a>
              <a class="card-open">打开</a>
            </footer>
            <div class="collection-item__controls">
              <button type="button" class="collection-item__star" title="星标">☆</button>
            </div>
          </div>
        </div>
      </article>
    </template>

    <template id="keywordSearchResultTemplate">
      <article class="result-card keyword-search-card">
        <header class="card-header">
          <h2 class="card-title"></h2>
          <span class="card-badge"></span>
        </header>
        <dl class="card-meta"></dl>
        <footer class="card-footer">
          <a class="card-action" target="_blank" rel="noopener noreferrer">复制磁力链接</a>
          <a class="card-open">打开</a>
        </footer>
      </article>
    </template>

    <div id="addItemModal" class="modal" hidden>
      <div class="modal-content">
        <header class="modal-header">
          <h2>添加新条目</h2>
          <button type="button" class="close-modal-btn">&times;</button>
        </header>
        <div class="modal-body">
          <div class="modal-tabs">
            <button type="button" class="modal-tab is-active" data-tab="singleAdd">手动添加</button>
            <button type="button" class="modal-tab" data-tab="batchAdd">批量添加 (Magnet)</button>
          </div>
          
          <div id="singleAddTab" class="modal-tab-content">
            <form id="singleAddForm">
              <div class="form-group">
                <label for="itemMagnet">磁力链接 (Magnet) *</label>
                <input type="text" id="itemMagnet" name="magnet" placeholder="magnet:?xt=..." required />
              </div>
              <div class="form-group">
                <label for="itemTitle">标题 (可选)</label>
                <input type="text" id="itemTitle" name="title" placeholder="如果不填将自动生成" />
              </div>
              <div class="form-group">
                <label for="itemKeywords">关键字 (可选)</label>
                <input type="text" id="itemKeywords" name="keywords" placeholder="空格分隔" />
              </div>
              <div class="form-group">
                <label for="itemRemarks">备注 / 笔记 (可选)</label>
                <textarea id="itemRemarks" name="remarks" placeholder="在这里输入条目备注..."></textarea>
              </div>
              <div class="modal-footer">
                <button type="submit" class="primary-btn">添加到集合</button>
              </div>
            </form>
          </div>

          <div id="batchAddTab" class="modal-tab-content" hidden>
            <form id="batchAddForm">
              <div class="form-group">
                <label for="batchMagnets">磁力链接列表 (每行一个) *</label>
                <textarea id="batchMagnets" name="magnets" placeholder="magnet:?xt=...
magnet:?xt=..." required></textarea>
              </div>
              <p class="form-helper">批量添加仅支持添加磁力链接。如果需要更详细的信息，请使用 CSV 导入。</p>
              <div class="modal-footer">
                <button type="submit" class="primary-btn">批量添加</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
